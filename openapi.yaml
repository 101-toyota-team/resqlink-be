openapi: 3.0.1
info:
  title: ResQLink API
  description: >
    Backend API for the ResQLink ambulance booking and dispatch platform.
    Features static discovery via H3 spatial indexing and a simulated movement
    flow.
  version: 1.0.0
tags:
  - name: Providers
paths:
  /providers/search:
    get:
      summary: Search Providers
      deprecated: false
      description: Search for providers by name (case-insensitive).
      tags:
        - Providers
      parameters:
        - name: q
          in: query
          description: ''
          required: true
          example: RS Universitas Indonesia
          schema:
            type: string
            minLength: 2
            maxLength: 256
      responses:
        '200':
          description: A list of providers matching the query
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Provider'
          headers: {}
        '400':
          $ref: '#/components/responses/ValidationError'
          description: Invalid payload or parameters
        '401':
          $ref: '#/components/responses/UnauthorizedError'
          description: Missing or invalid JWT
        '500':
          $ref: '#/components/responses/InternalError'
          description: Unexpected backend failure
      security:
        - BearerAuth: []
  /providers/nearby:
    get:
      summary: Find Nearby Providers
      deprecated: false
      description: >-
        Find providers within an expanding H3 ring search (up to ~60 km radius),
        ordered by distance ascending. Returns up to 50 results closest to the
        user.
      tags:
        - Providers
      parameters:
        - name: h3_index
          in: query
          description: >-
            H3 cell index at resolution 7 (15-character hex string). Use
            h3.latLngToCell(lat, lng, 7) to generate.
          required: true
          example: 878c10702ffffff
          schema:
            type: string
            pattern: ^[0-9a-f]+$
            minLength: 15
            maxLength: 15
        - name: lat
          in: query
          required: false
          description: User latitude (optional, falls back to H3 cell center).
          schema:
            type: number
            minimum: -90
            maximum: 90
        - name: lng
          in: query
          required: false
          description: User longitude (optional, falls back to H3 cell center).
          schema:
            type: number
            minimum: -180
            maximum: 180
      responses:
        '200':
          description: Up to 50 nearby providers sorted by distance ascending.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProviderDetails'
          headers: {}
        '400':
          $ref: '#/components/responses/ValidationError'
          description: Invalid payload or parameters
        '401':
          $ref: '#/components/responses/UnauthorizedError'
          description: Missing or invalid JWT
        '500':
          $ref: '#/components/responses/InternalError'
          description: Unexpected backend failure
      security:
        - BearerAuth: []
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: object
          description: Optional Zod formatting details for validation errors
          properties: {}
      required:
        - error
    Provider:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        h3_index:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        provider_type:
          type: string
        address:
          type: string
        phone:
          type: string
        created_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - h3_index
        - latitude
        - longitude
        - provider_type
        - created_at
    ProviderDetails:
      allOf:
        - $ref: '#/components/schemas/Provider'
        - type: object
          properties:
            distance:
              type: string
              example: 1.2 km
  responses:
    ValidationError:
      description: Invalid payload or parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Success:
              summary: Success
              value:
                error: Validation failed
                details: {}
    UnauthorizedError:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Success:
              summary: Success
              value:
                error: Unauthorized access
    ForbiddenError:
      description: Valid JWT but inadequate permissions/roles
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Success:
              summary: Success
              value:
                error: You do not have permission to access this resource
    NotFoundError:
      description: Resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Success:
              summary: Success
              value:
                error: Booking not found
    InternalError:
      description: Unexpected backend failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Success:
              summary: Success
              value:
                error: Internal server error
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
servers: []
security:
  - BearerAuth: []
